# InfluxDB 3 AI Stack Demo
# Includes: InfluxDB 3 Enterprise, InfluxDB 3 Explorer
# The MCP server is launched on demand by your AI client (see README)
#
# Prerequisites:
#   1. Run: bash scripts/setup.sh
#   2. Edit .env with your email address
#   3. Run: docker compose up -d

name: influxdb3-ai-stack-demo

services:

  # ────────────────────────────────────────────────────────────
  # InfluxDB 3 Enterprise
  # HTTP API:  http://localhost:18181
  # ────────────────────────────────────────────────────────────
  demo-influxdb3-enterprise:
    image: influxdb:3-enterprise
    container_name: demo-influxdb3-enterprise
    restart: unless-stopped
    ports:
      - "18181:8181"
    environment:
      INFLUXDB3_ENTERPRISE_LICENSE_EMAIL: ${INFLUXDB3_ENTERPRISE_LICENSE_EMAIL}
      INFLUXDB3_AUTH_TOKEN: ${INFLUXDB3_AUTH_TOKEN}
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --cluster-id=cluster0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
      - --plugin-dir=/var/lib/influxdb3/plugins
      - --admin-token-file=/run/secrets/admin-token
    secrets:
      - admin-token
    volumes:
      - type: bind
        source: ./data/enterprise
        target: /var/lib/influxdb3/data
      - type: bind
        source: ./data/plugins
        target: /var/lib/influxdb3/plugins
    healthcheck:
      test: ["CMD", "influxdb3", "query", "--token", "${INFLUXDB3_AUTH_TOKEN}", "--database", "_internal", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - influxdb3-net

  # ────────────────────────────────────────────────────────────
  # InfluxDB 3 Explorer (UI)
  # Web UI: http://localhost:18888
  # ────────────────────────────────────────────────────────────
  demo-influxdb3-explorer:
    image: influxdata/influxdb3-ui:latest
    container_name: demo-influxdb3-explorer
    restart: unless-stopped
    ports:
      - "18888:80"
    environment:
      SESSION_SECRET_KEY: ${EXPLORER_SESSION_SECRET_KEY}
    command:
      - --mode=admin
    volumes:
      - type: bind
        source: ./data/explorer
        target: /db
      - type: bind
        source: ./config
        target: /app-root/config
        read_only: true
    depends_on:
      demo-influxdb3-enterprise:
        condition: service_healthy
    networks:
      - influxdb3-net

secrets:
  admin-token:
    file: ./config/admin-token.json

networks:
  influxdb3-net:
    driver: bridge
