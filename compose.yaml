# InfluxDB 3 AI Stack Demo
# Includes: InfluxDB 3 Enterprise, InfluxDB 3 Explorer, and InfluxDB 3 MCP Server
#
# Prerequisites:
#   1. Run: bash scripts/setup.sh
#   2. Edit .env with your email address
#   3. Run: docker compose up -d

name: influxdb3-stack

services:

  # ────────────────────────────────────────────────────────────
  # InfluxDB 3 Enterprise
  # HTTP API:  http://localhost:18181
  # ────────────────────────────────────────────────────────────
  influxdb3-enterprise:
    image: influxdb:3-enterprise
    container_name: influxdb3-enterprise
    restart: unless-stopped
    ports:
      - "18181:8181"
    environment:
      INFLUXDB3_ENTERPRISE_LICENSE_EMAIL: ${INFLUXDB3_ENTERPRISE_LICENSE_EMAIL}
    command:
      - influxdb3
      - serve
      - --node-id=node0
      - --cluster-id=cluster0
      - --object-store=file
      - --data-dir=/var/lib/influxdb3/data
      - --plugin-dir=/var/lib/influxdb3/plugins
      - --admin-token-file=/run/secrets/admin-token
    secrets:
      - admin-token
    volumes:
      - type: bind
        source: ./data/enterprise
        target: /var/lib/influxdb3/data
      - type: bind
        source: ./data/plugins
        target: /var/lib/influxdb3/plugins
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - influxdb3-net

  # ────────────────────────────────────────────────────────────
  # InfluxDB 3 Explorer (UI)
  # Web UI: http://localhost:18888
  # ────────────────────────────────────────────────────────────
  influxdb3-explorer:
    image: influxdata/influxdb3-ui:latest
    container_name: influxdb3-explorer
    restart: unless-stopped
    ports:
      - "18888:80"
    environment:
      SESSION_SECRET_KEY: ${EXPLORER_SESSION_SECRET_KEY}
    command:
      - --mode=admin
    volumes:
      - type: bind
        source: ./data/explorer
        target: /db
      - type: bind
        source: ./config
        target: /app-root/config
        read_only: true
    depends_on:
      influxdb3-enterprise:
        condition: service_healthy
    networks:
      - influxdb3-net

  # ────────────────────────────────────────────────────────────
  # InfluxDB 3 MCP Server
  # MCP stdio transport for AI agent integration
  # See README for Claude Desktop / other MCP client setup
  # ────────────────────────────────────────────────────────────
  influxdb3-mcp:
    image: influxdata/influxdb3-mcp-server:latest
    container_name: influxdb3-mcp
    restart: unless-stopped
    environment:
      INFLUX_DB_PRODUCT_TYPE: enterprise
      INFLUX_DB_INSTANCE_URL: http://influxdb3-enterprise:8181/
      INFLUX_DB_TOKEN: ${INFLUXDB3_AUTH_TOKEN}
    depends_on:
      influxdb3-enterprise:
        condition: service_healthy
    networks:
      - influxdb3-net

secrets:
  admin-token:
    file: ./config/admin-token.json

networks:
  influxdb3-net:
    driver: bridge
